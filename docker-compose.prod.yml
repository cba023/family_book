version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: genealogy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genealogy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genealogy}
      POSTGRES_DB: ${POSTGRES_DB:-genealogy}
    volumes:
      - genealogy-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genealogy} -d ${POSTGRES_DB:-genealogy}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    image: familybook:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        SERVER_ACTIONS_STRICT_ORIGIN: ${SERVER_ACTIONS_STRICT_ORIGIN:-}
        SERVER_ACTIONS_ALLOWED_ORIGINS: ${SERVER_ACTIONS_ALLOWED_ORIGINS:-}
    container_name: familybook
    ports:
      - "3000:3000"
    volumes:
      - familybook-app-data:/app/data
      - genealogy-backups:/app/backups
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_FAMILY_SURNAME=${NEXT_PUBLIC_FAMILY_SURNAME:-陈}
      - DATABASE_URL=${DATABASE_URL:-postgresql://genealogy:genealogy@postgres:5432/genealogy}
      - AUTH_SECRET=${AUTH_SECRET}
      # 可选：全站 HTTPS 时设为 1，会话 Cookie 使用 Secure
      - AUTH_USE_SECURE_COOKIE=${AUTH_USE_SECURE_COOKIE:-}
      - SEAWEEDFS_URL=${SEAWEEDFS_URL:-http://192.168.1.8:18888}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  genealogy-pg-data:
    driver: local
  familybook-app-data:
    driver: local
  genealogy-backups:
    driver: local
