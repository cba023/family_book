version: '3.8'

services:
  # 生产环境
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: genealogy-app
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据库和备份
      - ./data:/app/data
      - ./backups:/app/backups
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_FAMILY_SURNAME=${NEXT_PUBLIC_FAMILY_SURNAME:-陈}
      # 本机 Supabase CLI（npx supabase start）API 默认 54321；容器内访问宿主机请配合 extra_hosts
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # 开发环境（可选）
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: genealogy-dev
    ports:
      - "3000:3000"
    volumes:
      # 源代码热重载
      - .:/app
      - /app/node_modules
      # 持久化数据库
      - ./data:/app/data
      - ./backups:/app/backups
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_FAMILY_SURNAME=${NEXT_PUBLIC_FAMILY_SURNAME:-陈}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npm run dev
    profiles:
      - dev

  # 自动备份服务（可选）
  backup:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: genealogy-backup
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    environment:
      - NODE_ENV=production
    # 每天凌晨 2 点执行备份
    command: >
      sh -c "
        while true; do
          sleep 60
          current_hour=$$(date +%H)
          current_min=$$(date +%M)
          if [ \"$$current_hour\" = \"02\" ] && [ \"$$current_min\" = \"00\" ]; then
            echo \"[$$(date)] Running backup...\"
            npm run db:backup
            sleep 60
          fi
        done
      "
    profiles:
      - backup
    restart: unless-stopped
