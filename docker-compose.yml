version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: genealogy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genealogy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genealogy}
      POSTGRES_DB: ${POSTGRES_DB:-genealogy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genealogy} -d ${POSTGRES_DB:-genealogy}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: familybook:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        SERVER_ACTIONS_STRICT_ORIGIN: ${SERVER_ACTIONS_STRICT_ORIGIN:-}
        SERVER_ACTIONS_ALLOWED_ORIGINS: ${SERVER_ACTIONS_ALLOWED_ORIGINS:-}
    container_name: familybook-app
    ports:
      - "3000:3000"
    volumes:
      - familybook-data:/app/data
      - ./backups:/app/backups
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_FAMILY_SURNAME=${NEXT_PUBLIC_FAMILY_SURNAME:-陈}
      - DATABASE_URL=${DATABASE_URL:-postgresql://genealogy:genealogy@postgres:5432/genealogy}
      - AUTH_SECRET=${AUTH_SECRET}
      # 可选：全站 HTTPS 时设为 1，会话 Cookie 使用 Secure
      - AUTH_USE_SECURE_COOKIE=${AUTH_USE_SECURE_COOKIE:-}
      - SEAWEEDFS_URL=${SEAWEEDFS_URL:-http://192.168.1.8:18888}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: genealogy-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./backups:/app/backups
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_FAMILY_SURNAME=${NEXT_PUBLIC_FAMILY_SURNAME:-陈}
      - DATABASE_URL=${DATABASE_URL:-postgresql://genealogy:genealogy@host.docker.internal:5432/genealogy}
      - AUTH_SECRET=${AUTH_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npm run dev
    profiles:
      - dev

  backup:
    image: postgres:16-alpine
    container_name: genealogy-backup
    volumes:
      - ./backups:/backups
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-genealogy}
      PGPASSWORD: ${POSTGRES_PASSWORD:-genealogy}
      PGDATABASE: ${POSTGRES_DB:-genealogy}
    command: >
      sh -c "
        while true; do
          sleep 60
          h=$$(date +%H)
          m=$$(date +%M)
          if [ \"$$h\" = \"02\" ] && [ \"$$m\" = \"00\" ]; then
            ts=$$(date -u +%Y-%m-%dT%H-%M-%S)
            pg_dump -Fc -f /backups/genealogy-$$ts.dump
            sleep 60
          fi
        done
      "
    profiles:
      - backup
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  familybook-data:
